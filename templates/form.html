{% extends "base.html" %}
{% block title %}Novo treino - Exercícios{% endblock %}
{% block content %}
<h1 class="page-title">Novo treino</h1>
<form method="post" action="/novo" class="form">
    <div class="row">
        <label>
            Data
            <input type="date" name="workout_date" value="{{ today }}" required />
        </label>
        <label>
            Esporte
            <select name="sport" required>
                <option value="corrida">🏃 Corrida</option>
                <option value="natacao">🏊 Natação</option>
                <option value="outro">💪 Outro</option>
            </select>
        </label>
    </div>
    <div class="row">
        <label>
            Distância (km)
            <input type="number" step="0.01" min="0" name="distance_km" placeholder="ex: 5.2" />
        </label>
        <label>
            Duração (min)
            <input type="number" step="1" min="0" name="duration_min" placeholder="ex: 30" />
        </label>
        <label>
            Calorias (kcal)
            <input type="number" step="1" min="0" name="calories" placeholder="ex: 450" />
        </label>
    </div>
    <label>
        Notas
        <textarea name="notes" rows="3" placeholder="Como foi o treino?"></textarea>
    </label>
    <div class="actions">
        <a href="/" class="btn-ghost">Cancelar</a>
        <button type="submit" class="btn-primary">Salvar treino</button>
    </div>
</form>
{% endblock %}
