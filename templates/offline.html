<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Sem conexão - MultiFit</title>
    <style>
        html, body { height: 100%; margin: 0; }
        body {
            background: #050810;
            color: #f1f5f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }
        .box { max-width: 320px; }
        .icon { color: #3b82f6; margin-bottom: 20px; }
        h1 { font-size: 1.4rem; margin: 0 0 10px; }
        p { color: #94a3b8; line-height: 1.5; margin: 0 0 24px; }
        button {
            background: #3b82f6; color: #fff; border: none;
            border-radius: 10px; padding: 12px 22px; font-size: 1rem;
            font-weight: 600; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="icon">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5h11M6.5 17.5h11M4 6.5v11M20 6.5v11M9 12h6"/></svg>
        </div>
        <h1>Sem conexão</h1>
        <p>O MultiFit precisa de internet para carregar seus treinos. Verifique sua conexão e tente de novo.</p>
        <button onclick="location.reload()">Tentar novamente</button>
    </div>
</body>
</html>
